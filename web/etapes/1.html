<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Etape 1 — Canvas bleu</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1a1a2e;
            font-family: system-ui, sans-serif;
            color: #aaa;
        }
        canvas { border: 3px solid #333; border-radius: 8px; max-width: 100vw; }
        p { margin-top: 12px; font-size: 14px; }
        a { color: #87CEEB; }
    </style>
</head>
<body>
    <canvas id="jeu" width="288" height="512"></canvas>
    <p>Etape 1 : un rectangle bleu ciel sur le canvas.</p>
    <p><a href="../../">← Jeu</a> · <a href="2.html">Etape 2 →</a></p>

    <script>
        // --- Setup ---
        const WIDTH = 288;
        const HEIGHT = 512;
        const canvas = document.getElementById("jeu");
        const ctx = canvas.getContext("2d");

        // --- Draw ---
        // fillRect = paint a filled rectangle (x, y, width, height)
        ctx.fillStyle = "#87CEEB";
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
    </script>
</body>
</html>
