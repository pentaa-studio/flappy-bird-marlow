<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Etape 3 — Bouger l'oiseau</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1a1a2e;
            font-family: system-ui, sans-serif;
            color: #aaa;
            touch-action: manipulation;
        }
        canvas { border: 3px solid #333; border-radius: 8px; max-width: 100vw; image-rendering: pixelated; }
        p { margin-top: 12px; font-size: 14px; text-align: center; padding: 0 16px; }
        a { color: #87CEEB; }
    </style>
</head>
<body>
    <canvas id="jeu" width="288" height="512"></canvas>
    <p>Tap en haut = monter · Tap en bas = descendre</p>
    <p><a href="2.html">← Etape 2</a> · <a href="../../">Jeu</a> · <a href="4.html">Etape 4 →</a></p>

    <script>
        // --- Setup ---
        const WIDTH = 288;
        const HEIGHT = 512;
        const VITESSE = 2;
        const canvas = document.getElementById("jeu");
        const ctx = canvas.getContext("2d");

        let oiseauY = HEIGHT / 4;
        let direction = 1;

        const oiseau = new Image();
        oiseau.src = "../../images/flappyrouge-milieu.png";
        oiseau.onload = boucle;

        // --- Draw ---
        function dessiner() {
            ctx.fillStyle = "#87CEEB";
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            const x = WIDTH / 2 - oiseau.width / 2;
            const y = oiseauY - oiseau.height / 2;
            ctx.drawImage(oiseau, x, y);
        }

        // --- Update ---
        function mettreAJour() {
            oiseauY += direction * VITESSE;

            // Keep bird on screen
            if (oiseauY < oiseau.height / 2) oiseauY = oiseau.height / 2;
            if (oiseauY > HEIGHT - oiseau.height / 2) oiseauY = HEIGHT - oiseau.height / 2;
        }

        // --- Game loop ---
        // requestAnimationFrame = call boucle ~60 times per second
        function boucle() {
            mettreAJour();
            dessiner();
            requestAnimationFrame(boucle);
        }

        // --- Controls ---
        function tap(y) {
            direction = y < HEIGHT / 2 ? -1 : 1;
        }

        canvas.addEventListener("click", (e) => {
            const rect = canvas.getBoundingClientRect();
            const y = (e.clientY - rect.top) * (HEIGHT / rect.height);
            tap(y);
        });

        canvas.addEventListener("touchstart", (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const y = (e.touches[0].clientY - rect.top) * (HEIGHT / rect.height);
            tap(y);
        }, { passive: false });
    </script>
</body>
</html>
