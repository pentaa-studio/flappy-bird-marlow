<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Etape 4 — Un tuyau</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1a1a2e;
            font-family: system-ui, sans-serif;
            color: #aaa;
            touch-action: manipulation;
        }
        canvas { border: 3px solid #333; border-radius: 8px; max-width: 100vw; image-rendering: pixelated; }
        p { margin-top: 12px; font-size: 14px; text-align: center; padding: 0 16px; }
        a { color: #87CEEB; }
    </style>
</head>
<body>
    <canvas id="jeu" width="288" height="512"></canvas>
    <p>Etape 4 : un tuyau qui avance. Tap haut/bas pour bouger l'oiseau.</p>
    <p><a href="3.html">← Etape 3</a> · <a href="../../">Jeu complet →</a></p>

    <script>
        // --- Setup ---
        const WIDTH = 288;
        const HEIGHT = 512;
        const ESPACE_TUYAUX = 100;
        const VITESSE = 2;
        const canvas = document.getElementById("jeu");
        const ctx = canvas.getContext("2d");

        let oiseauY = HEIGHT / 4;
        let direction = 1;
        let tuyauX = WIDTH;
        let gapTop = 150;

        const images = {};
        const noms = ["flappyrouge-milieu", "tuyau-vert-haut", "tuyau-vert-bas"];

        function chargerImage(nom) {
            return new Promise((ok, ko) => {
                const img = new Image();
                img.onload = () => { images[nom] = img; ok(); };
                img.onerror = ko;
                img.src = "../../images/" + nom + ".png";
            });
        }

        Promise.all(noms.map(chargerImage)).then(boucle);

        // --- Logic ---
        function placerTuyaux() {
            tuyauX = WIDTH;
            gapTop = 100 + Math.floor(Math.random() * (HEIGHT - ESPACE_TUYAUX - 200));
        }

        // --- Draw ---
        function dessiner() {
            ctx.fillStyle = "#87CEEB";
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            const oiseau = images["flappyrouge-milieu"];
            ctx.drawImage(oiseau, WIDTH / 2 - oiseau.width / 2, oiseauY - oiseau.height / 2);

            const tuyauHaut = images["tuyau-vert-haut"];
            const tuyauBas = images["tuyau-vert-bas"];
            const tW = tuyauBas.width;

            ctx.drawImage(tuyauHaut, tuyauX, 0, tW, gapTop);
            const basY = gapTop + ESPACE_TUYAUX;
            ctx.drawImage(tuyauBas, tuyauX, basY, tW, HEIGHT - basY);
        }

        // --- Update ---
        function mettreAJour() {
            oiseauY += direction * VITESSE;

            tuyauX -= VITESSE;
            if (tuyauX + images["tuyau-vert-bas"].width < 0) {
                placerTuyaux();
            }

            if (oiseauY < 0 || oiseauY > HEIGHT) {
                oiseauY = HEIGHT / 4;
            }
        }

        // --- Game loop ---
        function boucle() {
            mettreAJour();
            dessiner();
            requestAnimationFrame(boucle);
        }

        // --- Controls ---
        function tap(y) {
            direction = y < HEIGHT / 2 ? -1 : 1;
        }

        canvas.addEventListener("click", (e) => {
            const rect = canvas.getBoundingClientRect();
            const y = (e.clientY - rect.top) * (HEIGHT / rect.height);
            tap(y);
        });

        canvas.addEventListener("touchstart", (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const y = (e.touches[0].clientY - rect.top) * (HEIGHT / rect.height);
            tap(y);
        }, { passive: false });
    </script>
</body>
</html>
