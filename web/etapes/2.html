<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Etape 2 — Afficher l'oiseau</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1a1a2e;
            font-family: system-ui, sans-serif;
            color: #aaa;
        }
        canvas { border: 3px solid #333; border-radius: 8px; max-width: 100vw; image-rendering: pixelated; }
        p { margin-top: 12px; font-size: 14px; text-align: center; padding: 0 16px; }
        a { color: #87CEEB; }
    </style>
</head>
<body>
    <canvas id="jeu" width="288" height="512"></canvas>
    <p>Etape 2 : charger une image PNG et la dessiner au centre.</p>
    <p><a href="1.html">← Etape 1</a> · <a href="../../">Jeu</a> · <a href="3.html">Etape 3 →</a></p>

    <script>
        // --- Setup ---
        const WIDTH = 288;
        const HEIGHT = 512;
        const canvas = document.getElementById("jeu");
        const ctx = canvas.getContext("2d");

        let oiseauY = HEIGHT / 4;

        // --- Load image ---
        const oiseau = new Image();
        oiseau.src = "../../images/flappyrouge-milieu.png";

        oiseau.onload = dessiner;

        // --- Draw ---
        function dessiner() {
            ctx.fillStyle = "#87CEEB";
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            // drawImage(image, x, y) — x/y = top-left corner
            const x = WIDTH / 2 - oiseau.width / 2;
            const y = oiseauY - oiseau.height / 2;
            ctx.drawImage(oiseau, x, y);
        }
    </script>
</body>
</html>
